<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>starpattern program</title>
</head>
<body>
    <h1>star pattern program</h1>
    <script>
        var output="";
        for(i=1; i<=5; i++)
        {     
              output+=i;
            output+="\n";
            document.writeln("<br>"+output);   
        }  
    </script>

    <!-- reverse pattern -->
    <h1>reverse patterrn</h1>
    <script>
        var a="";
        for(i=5; i>=1; i++){
            a+=i;
            a+="\n";
            document.writeln("<br>"+a)
        }
    </script>
     
</body>
</html>
