<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1>print table</h1>

    <script>
        var num=10;
        for(i=1; i<=10; i++){
            document.writeln("<br>"+num+"x"+i+"="+num*i)
        }
    </script>
</body>
